{{define "rebootContent"}}
<h1>🔄 Riavvio sistema</h1>
<div class="card-modern">
    <div class="card-header">Opzioni di riavvio</div>
    <div class="card-body">
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem;">
            <!-- Riavvio locale (unico) -->
            <button id="rebootLocal" class="button">🖥️ Riavvia questa macchina</button>

            <!-- Riavvio singolo per ogni macchina remota -->
            {{range .RemoteMachines}}
                {{if ne .ID "local"}}
                <button class="rebootRemoteBtn button" data-id="{{.ID}}">🔄 Riavvia {{.Name}} ({{.Host}})</button>
                {{end}}
            {{end}}

            <!-- Unico pulsante per cascata -->
            {{if gt (len .RemoteMachines) 1}}
            <button id="rebootCascadeAll" class="button">⚙️ Riavvio in cascata (tutte le macchine)</button>
            {{end}}
        </div>
        <div id="rebootStatus" style="margin-top: 1rem; padding: 0.5rem; border-radius: 4px; display: none;"></div>
        <div id="rebootTimer" style="margin-top: 0.5rem; font-size: 0.9rem; display: none;"></div>
    </div>
</div>

<script>
    let pollInterval = null;
    let timerInterval = null;

    function showStatus(message, isError) {
        const statusDiv = document.getElementById('rebootStatus');
        statusDiv.style.display = 'block';
        statusDiv.innerHTML = message;
        statusDiv.style.backgroundColor = isError ? '#fce7e7' : '#e7fce7';
        statusDiv.style.color = isError ? '#c00' : '#0a0';
    }

    function updateTimer(secondsLeft) {
        const timerDiv = document.getElementById('rebootTimer');
        if (secondsLeft > 0) {
            timerDiv.style.display = 'block';
            timerDiv.innerHTML = `⏳ Prossimo tentativo tra ${secondsLeft} secondi...`;
        } else {
            timerDiv.style.display = 'none';
        }
    }

    function pollStatus(opId) {
        if (pollInterval) clearInterval(pollInterval);
        if (timerInterval) clearInterval(timerInterval);
        pollInterval = setInterval(async () => {
            try {
                const resp = await fetch('/api/reboot-status?id=' + encodeURIComponent(opId));
                if (!resp.ok) {
                    clearInterval(pollInterval);
                    pollInterval = null;
                    showStatus('❌ Errore nel recupero dello stato', true);
                    return;
                }
                const data = await resp.json();
                showStatus('🔄 ' + data.message, data.status === 'error');
                if (data.status === 'completed' || data.status === 'error') {
                    clearInterval(pollInterval);
                    pollInterval = null;
                    clearInterval(timerInterval);
                    timerInterval = null;
                    updateTimer(0);
                    if (data.status === 'completed') {
                        showStatus('✅ ' + data.message, false);
                    }
                }
            } catch (err) {
                clearInterval(pollInterval);
                pollInterval = null;
                showStatus('❌ Errore di rete: ' + err, true);
            }
        }, 3000);
    }

    function startTimer(seconds) {
        if (timerInterval) clearInterval(timerInterval);
        let remaining = seconds;
        updateTimer(remaining);
        timerInterval = setInterval(() => {
            remaining--;
            if (remaining <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                updateTimer(0);
            } else {
                updateTimer(remaining);
            }
        }, 1000);
    }

    async function callReboot(endpoint, isAsync = false) {
        showStatus('⏳ In esecuzione...', false);
        try {
            const resp = await fetch(endpoint, { method: 'POST' });
            if (!resp.ok) {
                const text = await resp.text();
                showStatus('❌ Errore: ' + text, true);
                return;
            }
            if (isAsync) {
                const data = await resp.json();
                const opId = data.id;
                showStatus('⏳ Riavvio avviato. Monitoraggio in corso...', false);
                pollStatus(opId);
                startTimer(30);
            } else {
                const text = await resp.text();
                showStatus('✅ ' + text, false);
                if (endpoint.includes('/reboot-local')) {
                    setTimeout(() => { window.location.href = '/login'; }, 5000);
                }
            }
        } catch (err) {
            showStatus('❌ Errore di rete: ' + err, true);
        }
    }

    document.getElementById('rebootLocal').addEventListener('click', () => {
        if (confirm('⚠️ ATTENZIONE: il riavvio della macchina principale interromperà il servizio per alcuni minuti. Proseguire?')) {
            callReboot('/api/reboot-local', false);
        }
    });

    document.querySelectorAll('.rebootRemoteBtn').forEach(btn => {
        btn.addEventListener('click', () => {
            const id = btn.dataset.id;
            const name = btn.textContent.trim().replace('🔄 Riavvia ', '');
            if (confirm('⚠️ ATTENZIONE: il riavvio di ' + name + ' interromperà il servizio su quella macchina per alcuni minuti. Proseguire?')) {
                callReboot('/api/reboot-remote?id=' + encodeURIComponent(id), true);
            }
        });
    });

    // Pulsante "Riavvio in cascata (tutte le macchine)"
    const cascadeBtn = document.getElementById('rebootCascadeAll');
    if (cascadeBtn) {
        cascadeBtn.addEventListener('click', () => {
            if (confirm('⚠️ ATTENZIONE: il riavvio in cascata riavvierà tutte le macchine remote una alla volta e poi la macchina principale. Proseguire?')) {
                callReboot('/api/reboot-cascade-all', true);
            }
        });
    }
</script>
{{end}}
