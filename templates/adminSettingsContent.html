{{define "adminSettingsContent"}}
<h1>Impostazioni di sistema</h1>
<div class="card-modern" style="max-width: 500px;">
    <div class="card-body">
        <form method="POST" action="/admin/settings/save">
            {{ .CSRFField }}
            <label>Giorni validità password (0 = mai scadenza)</label>
            <input type="number" name="password_expiry" value="{{.PasswordExpiry}}" min="0">
            <button type="submit" style="margin-top:1rem;">Salva impostazioni</button>
        </form>
        <hr>
        <small>La scadenza decorre dall'ultima modifica della password. Dopo la scadenza, l'utente sarà costretto a cambiarla al login.</small>
    </div>
</div>
{{end}}
