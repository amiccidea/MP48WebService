{{define "configUploadContent"}}
<h1>📤 Carica impostazioni</h1>
<div class="card-modern">
    <div class="card-header">Nuova configurazione</div>
    <div class="card-body">
        {{if .Message}}<div style="background:#dcfce7; padding:0.5rem; margin-bottom:1rem;">✅ {{.Message}}</div>{{end}}
        <form id="uploadForm" method="POST" enctype="multipart/form-data">
            <input type="file" name="configfile" id="configfile" required accept=".rdc,.rcd,.cfg,.conf,.json"><br><br>
            <button type="submit">Carica</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('uploadForm').addEventListener('submit', function(e) {
        const fileInput = document.getElementById('configfile');
        const fileName = fileInput.files[0] ? fileInput.files[0].name : '';
        const confirmMsg = '⚠️ ATTENZIONE: questa operazione sovrascriverà il file di configurazione attualmente in uso.\n\n' +
                           'Prima di procedere verrà creato automaticamente un backup del file corrente.\n\n' +
                           'Sei sicuro di voler caricare "' + fileName + '" e sostituire la configurazione di produzione?';
        if (!confirm(confirmMsg)) {
            e.preventDefault();
        }
    });
</script>
{{end}}
